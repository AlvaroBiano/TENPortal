server {
    listen 80;
    server_name portal.alvarobiano.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.alvarobiano.com.br;

    ssl_certificate /etc/letsencrypt/live/api.alvarobiano.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.alvarobiano.com.br/privkey.pem;

    root /var/www/tenportal/current;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/javascript application/json text/css image/svg+xml;
    gzip_min_length 1000;

    # Cache estático
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
