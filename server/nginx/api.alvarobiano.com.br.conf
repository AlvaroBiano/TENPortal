server {
    listen 80;
    server_name api.alvarobiano.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.alvarobiano.com.br;

    ssl_certificate /etc/letsencrypt/live/api.alvarobiano.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.alvarobiano.com.br/privkey.pem;

    # PostgreSQL via nginx as SSL proxy
    location / {
        tcp_nodelay on;
        proxy_pass http://127.0.0.1:54321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Client-Verify $ssl_client_verify;
    }
}
