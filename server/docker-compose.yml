# ============================================
# TENPortal Backend — docker-compose.yml
# Postgres + PgAdmin (gerenciamento)
# ============================================
# NÃO PRECISA DO SUPABASE COMPLETO
# O Next.js faz Auth via JWT + cookies
# ============================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: tenportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tenportal
      POSTGRES_USER: tenportal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:54321:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenportal -d tenportal"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tenportal-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tenportal.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  storage:
    image: minio/minio:latest
    container_name: tenportal-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/supabase/data/postgres

  pgadmin-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/supabase/data/pgadmin

  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/supabase/data/storage
